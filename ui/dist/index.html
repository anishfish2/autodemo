<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>demoo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; }
    .app { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 20px; font-weight: 600; margin-bottom: 16px; color: #999; }
    .subtitle { color: #666; margin-bottom: 32px; }
    .card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; font-weight: 500; }
    input[type="text"], textarea, select {
      width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid #333;
      border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none;
    }
    input:focus, textarea:focus { border-color: #4f8ff7; }
    textarea { min-height: 80px; resize: vertical; font-family: inherit; }
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #4f8ff7; color: white; }
    .btn-primary:hover { background: #3a7de6; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-secondary { background: #222; color: #ccc; border: 1px solid #333; }
    .btn-secondary:hover { background: #2a2a2a; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }
    .progress-bar { width: 100%; height: 4px; background: #222; border-radius: 2px; overflow: hidden; margin: 16px 0; }
    .progress-fill { height: 100%; background: #4f8ff7; border-radius: 2px; }
    .progress-fill.active { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .log { background: #0d0d0d; border: 1px solid #222; border-radius: 8px; padding: 12px; max-height: 60vh; overflow-y: auto; font-family: 'SF Mono', monospace; font-size: 12px; line-height: 1.6; }
    .log-line { color: #888; white-space: pre-wrap; word-break: break-all; }
    .log-line.thinking { color: #4f8ff7; }
    .log-line.action { color: #4ade80; }
    video { width: 100%; border-radius: 8px; background: #000; display: block; }
    .tabs { display: flex; gap: 4px; }
    .tab { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; color: #888; background: transparent; border: 1px solid transparent; }
    .tab.active { color: #fff; background: #222; border-color: #333; }
    .demo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .demo-card { background: #141414; border: 1px solid #222; border-radius: 10px; padding: 12px; cursor: pointer; transition: border-color 0.15s; }
    .demo-card:hover { border-color: #444; }
    .demo-card .thumb { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 24px; }
    .demo-card .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .demo-card .meta { font-size: 11px; color: #666; margin-top: 4px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: #141414; border: 1px solid #333; border-radius: 16px; padding: 32px; width: 480px; max-width: 90vw; }
    .modal h2 { margin-bottom: 20px; }
    .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
    .hidden { display: none; }
    .mb { margin-bottom: 16px; }
    .mt { margin-top: 16px; }
    .text-center { text-align: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .gap-8 { gap: 8px; }

    /* ── Timeline Editor ── */
    .editor-layout { display: flex; flex-direction: column; gap: 16px; }
    .timeline-wrapper { position: relative; }
    .timeline-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .timeline-toolbar .info { font-size: 12px; color: #666; }
    .timeline-canvas-wrap { position: relative; overflow-x: auto; overflow-y: hidden; background: #111; border: 1px solid #222; border-radius: 8px; }
    .timeline-canvas-wrap::-webkit-scrollbar { height: 6px; }
    .timeline-canvas-wrap::-webkit-scrollbar-track { background: #111; }
    .timeline-canvas-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    canvas#timeline { display: block; cursor: pointer; }
    .segment-panel { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 16px; }
    .segment-panel h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
    .segment-panel .row { display: flex; gap: 12px; align-items: center; }
    .speed-btn { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #333; background: #222; color: #ccc; transition: all 0.15s; }
    .speed-btn:hover { background: #2a2a2a; }
    .speed-btn.active { background: #4f8ff7; color: white; border-color: #4f8ff7; }
    .speed-btn.cut { background: #7f1d1d; color: #fca5a5; border-color: #991b1b; }
    .speed-btn.cut.active { background: #dc2626; color: white; border-color: #dc2626; }
    .time-label { font-size: 11px; color: #666; font-family: 'SF Mono', monospace; }
    .playback-time { font-family: 'SF Mono', monospace; font-size: 14px; color: #ccc; }
  </style>
</head>
<body>
  <div id="root" class="app"></div>
  <script>
    // ── State ──
    let S = {
      view: 'dashboard',
      config: {},
      demos: [],
      activeDemo: null,
      activeVideoType: null,
      // Editor state
      edl: [],           // Edit decision list segments
      zoomRegions: [],   // Zoom regions: { startSec, endSec, zoomLevel, cx, cy, auto }
      selectedSeg: -1,   // Selected segment index
      selectedZoom: -1,  // Selected zoom region index
      playheadSec: 0,
      totalInputDur: 0,
      totalOutputDur: 0,
      timelineZoom: 1,   // pixels per second
      showCuts: false,
      motionBlur: false,
      splitMode: false,  // Cut/split tool active
      isDragging: false,
      preflight: null,   // { checks, apiKeySet, allOk }
      ws: null,
    };

    const API = '/api';

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      return res.json();
    }

    // ── WebSocket ──
    function connectWS() {
      const ws = new WebSocket(`ws://${location.host}`);
      ws.onmessage = async (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'demo_log' && S.activeDemo) {
          S.activeDemo.log = S.activeDemo.log || [];
          S.activeDemo.log.push(msg.message);
          if (S.view === 'progress') render();
        }
        if (msg.type === 'demo_done') {
          if (S.activeDemo) {
            S.activeDemo.status = 'done';
            S.activeDemo.editedVideo = msg.editedVideo;
            S.activeDemo.rawVideo = msg.rawVideo;
            S.activeDemo.id = msg.id || S.activeDemo.id;
            S.view = 'editor';
            // Load EDL + zoom regions before rendering
            await loadEDL(S.activeDemo.id);
            render();
          }
        }
        if (msg.type === 'demo_error' && S.activeDemo) {
          S.activeDemo.status = 'error';
          S.activeDemo.error = msg.error;
          render();
        }
      };
      ws.onclose = () => setTimeout(connectWS, 2000);
      S.ws = ws;
    }

    // ── EDL ──
    async function loadEDL(demoId) {
      // Check for persisted edits first
      try {
        const meta = await api(`/demo/${demoId}/metadata`);
        if (meta.edl && Array.isArray(meta.edl) && meta.edl.length > 0) {
          S.edl = meta.edl;
          recalcDurations();
          S.zoomRegions = meta.zoomRegions || [];
          S.motionBlur = meta.motionBlur || false;
          if (meta.name && S.activeDemo) S.activeDemo.name = meta.name;
          return; // Persisted edits loaded — skip auto-generation
        }
      } catch {}

      // No persisted edits — build from action log
      try {
        const entries = await api(`/demo/${demoId}/edl`);
        if (Array.isArray(entries)) {
          S.edl = buildEDLFromEntries(entries);
          recalcDurations();
        }
      } catch {}

      // Load director zoom regions if available, fallback to auto-generated
      try {
        const zoomData = await fetch(`/api/demo/${demoId}/zoom-regions`).then(r => r.ok ? r.json() : null);
        if (Array.isArray(zoomData) && zoomData.length > 0) {
          S.zoomRegions = zoomData.map(z => ({ ...z, auto: true }));
        } else {
          const entries = await api(`/demo/${demoId}/edl`);
          if (Array.isArray(entries)) {
            S.zoomRegions = buildZoomRegions(entries);
          }
        }
      } catch {
        S.zoomRegions = [];
      }
    }

    function buildZoomRegions(entries) {
      // Auto-generate zoom regions from click events
      const regions = [];
      for (const e of entries) {
        if (e.type === 'action' && e.action === 'left_click' && e.coords) {
          const t = e.t / 1000;
          regions.push({
            startSec: Math.max(0, t - 0.3),
            endSec: t + 1.5,
            zoomLevel: 1.5,
            cx: e.coords[0],
            cy: e.coords[1],
            auto: true,
          });
        }
      }
      // Merge overlapping regions
      regions.sort((a, b) => a.startSec - b.startSec);
      const merged = [];
      for (const r of regions) {
        const prev = merged[merged.length - 1];
        if (prev && r.startSec <= prev.endSec) {
          prev.endSec = Math.max(prev.endSec, r.endSec);
          prev.cx = r.cx; // Use latest click position
          prev.cy = r.cy;
        } else {
          merged.push({ ...r });
        }
      }
      return merged;
    }

    function buildEDLFromEntries(entries) {
      // Reconstruct the same EDL the auto-editor builds
      const actions = [];
      for (let i = 0; i < entries.length; i++) {
        const e = entries[i];
        if (e.type === 'action' && e.action !== 'screenshot' && e.action !== 'zoom') {
          const done = entries.slice(i + 1).find(x => x.type === 'action_done');
          actions.push({
            startSec: e.t / 1000,
            endSec: done ? done.t / 1000 : e.t / 1000 + 0.5,
            label: e.action + (e.coords ? ` (${e.coords[0]},${e.coords[1]})` : ''),
          });
        }
      }
      // Get total duration from last entry
      const lastEntry = entries[entries.length - 1];
      const totalDur = lastEntry ? lastEntry.t / 1000 + 1 : 10;
      S.totalInputDur = totalDur;

      if (actions.length === 0) return [{ startSec: 0, endSec: totalDur, type: 'keep', speed: 1, label: 'full video' }];

      const HOLD = 0.8, APPROACH = 0.8;
      const segs = [];

      // Before first action — cut the startup/blank screen time
      if (actions[0].startSec - APPROACH > 0.1) {
        segs.push({ startSec: 0, endSec: actions[0].startSec - APPROACH, type: 'cut', speed: 0, label: 'startup' });
      }

      for (let i = 0; i < actions.length; i++) {
        const a = actions[i], next = actions[i + 1];
        const prevEnd = segs.length ? segs[segs.length - 1].endSec : 0;

        const approachStart = Math.max(prevEnd, a.startSec - APPROACH);
        if (approachStart < a.startSec)
          segs.push({ startSec: approachStart, endSec: a.startSec, type: 'keep', speed: 1, label: 'approach' });

        segs.push({ startSec: a.startSec, endSec: a.endSec, type: 'keep', speed: 1, label: a.label });

        const holdEnd = Math.min(a.endSec + HOLD, totalDur);
        segs.push({ startSec: a.endSec, endSec: holdEnd, type: 'keep', speed: 1, label: 'result' });

        if (next) {
          const gapEnd = next.startSec - APPROACH;
          if (gapEnd > holdEnd + 0.1)
            segs.push({ startSec: holdEnd, endSec: gapEnd, type: 'cut', speed: 0, label: 'thinking' });
        }
      }

      const lastEnd = segs.length ? segs[segs.length - 1].endSec : 0;
      if (lastEnd < totalDur) {
        segs.push({ startSec: lastEnd, endSec: Math.min(lastEnd + 2, totalDur), type: 'keep', speed: 1, label: 'outro' });
        if (lastEnd + 2 < totalDur)
          segs.push({ startSec: lastEnd + 2, endSec: totalDur, type: 'cut', speed: 0, label: 'trailing' });
      }

      return segs;
    }

    function recalcDurations() {
      S.totalOutputDur = 0;
      for (const seg of S.edl) {
        if (seg.type === 'keep') {
          const dur = seg.endSec - seg.startSec;
          S.totalOutputDur += seg.speed > 0 ? dur / seg.speed : 0;
        }
      }
    }

    function inputToOutputTime(inputSec) {
      let out = 0;
      for (const seg of S.edl) {
        if (seg.type === 'cut') continue;
        if (inputSec <= seg.startSec) break;
        const segDur = seg.endSec - seg.startSec;
        const speed = seg.speed || 1;
        if (inputSec >= seg.endSec) {
          out += segDur / speed;
        } else {
          out += (inputSec - seg.startSec) / speed;
          break;
        }
      }
      return out;
    }

    function outputToInputTime(outputSec) {
      let remaining = outputSec;
      for (const seg of S.edl) {
        if (seg.type === 'cut') continue;
        const segDur = seg.endSec - seg.startSec;
        const speed = seg.speed || 1;
        const outDur = segDur / speed;
        if (remaining <= outDur) {
          return seg.startSec + remaining * speed;
        }
        remaining -= outDur;
      }
      return S.totalInputDur;
    }

    function fmtTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      const ms = Math.floor((sec % 1) * 10);
      return `${m}:${String(s).padStart(2,'0')}.${ms}`;
    }

    // ── Render ──
    function render() {
      const root = document.getElementById('root');
      switch (S.view) {
        case 'dashboard': root.innerHTML = renderDashboard(); break;
        case 'progress': root.innerHTML = renderProgress(); break;
        case 'editor': root.innerHTML = renderEditor(); break;
        case 'settings': root.innerHTML = renderSettings(); break;
      }
      if (S.view === 'editor') { initTimeline(); initZoomTrack(); initPreview(); }
    }

    function renderDashboard() {
      const pf = S.preflight;
      const setupBanner = pf && !pf.allOk ? `
        <div class="card" style="border-color:#f59e0b;margin-bottom:16px">
          <h3 style="color:#f59e0b;margin-bottom:12px">Setup needed</h3>
          ${pf.checks.filter(c => c.status !== 'ok').map(c => `
            <div style="margin-bottom:8px">
              <span style="color:${c.status==='missing'?'#ef4444':'#f59e0b'}">${c.status==='missing'?'✗':'⚠'}</span>
              <strong>${c.name}</strong>: ${c.message}
              ${c.fix ? `<br><code style="font-size:12px;color:#888;background:#1a1a1a;padding:2px 6px;border-radius:4px">${escHtml(c.fix)}</code>` : ''}
            </div>
          `).join('')}
          ${!pf.apiKeySet ? `
            <div style="margin-bottom:8px">
              <span style="color:#ef4444">✗</span>
              <strong>API Key</strong>: Not configured
              <br><button class="btn btn-sm btn-secondary" style="margin-top:4px" onclick="S.view='settings';render()">Configure in Settings</button>
            </div>
          ` : ''}
        </div>
      ` : '';

      return `
        <div class="flex-between" style="margin-bottom:32px">
          <div><h1>demoo</h1><p class="subtitle">Automated demo video generation</p></div>
          <button class="btn btn-secondary" onclick="S.view='settings';render()">Settings</button>
        </div>
        ${setupBanner}
        <div class="card">
          <div class="mb"><label>URL or project path</label>
            <input type="text" id="input-url" placeholder="https://myapp.com or /path/to/project" /></div>
          <div class="mb"><label>Instructions (optional)</label>
            <textarea id="input-instructions" placeholder="Login with user@example.com / pass123. Show the dashboard..."></textarea></div>
          <div class="text-center mt">
            <button class="btn btn-primary" onclick="startDemo()">▶ Start Demo</button></div>
        </div>
        ${S.demos.length ? `<h2>Recent Demos</h2><div class="demo-grid">${S.demos.map(d => `
          <div class="demo-card" onclick="openDemo('${d.id}')" style="position:relative">
            ${d.thumbnail
              ? `<img src="${d.thumbnail}" style="width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:6px;margin-bottom:8px">`
              : `<div class="thumb">▶</div>`}
            <div class="name">${escHtml(d.name || d.task || d.id)}</div>
            <div class="meta">${d.status} · ${new Date(d.startedAt).toLocaleDateString()}</div>
            <button onclick="event.stopPropagation();deleteDemo('${d.id}')" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.6);border:none;color:#888;cursor:pointer;width:22px;height:22px;border-radius:11px;font-size:12px;display:flex;align-items:center;justify-content:center" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#888'">✕</button>
          </div>`).join('')}</div>` : ''}`;
    }

    function renderProgress() {
      const d = S.activeDemo;
      if (!d) return '';
      const logs = (d.log || []).slice(-40);
      return `
        <div class="flex-between" style="margin-bottom:24px">
          <h1>${d.status === 'planning' ? 'Planning...' : 'Recording...'}</h1>
          <button class="btn btn-secondary" onclick="S.view='dashboard';render()">Back</button>
        </div>
        <div class="card">
          <p style="color:#888;margin-bottom:8px">${escHtml(d.task)}</p>
          <div class="progress-bar"><div class="progress-fill active" style="width:60%"></div></div>
          ${d.status === 'error' ? `<p style="color:#ef4444;margin:8px 0">Error: ${escHtml(d.error||'')}</p>` : ''}
          <div class="log">${logs.map(l => `<div class="log-line ${l.includes('[Claude]')?'thinking':l.includes('[Action]')?'action':''}">${escHtml(l)}</div>`).join('')}</div>
        </div>`;
    }

    function renderEditor() {
      const d = S.activeDemo;
      if (!d) return '';
      if (!S.activeVideoType) S.activeVideoType = d.editedVideo ? 'edited' : 'raw';
      // Always use raw video — timeline is non-destructive editor
      const src = d.rawVideo || '';

      return `
        <div class="flex-between" style="margin-bottom:16px">
          <input type="text" id="demo-name" value="${escHtml(d.name || d.task || d.id)}"
            style="font-size:24px;font-weight:700;background:transparent;border:1px solid transparent;padding:4px 8px;border-radius:6px;width:auto;flex:1;margin-right:12px"
            onfocus="this.style.borderColor='#333'" onblur="this.style.borderColor='transparent';saveDemoName(this.value)"
            onkeydown="if(event.key==='Enter'){this.blur()}" />
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="saveEdits();S.view='dashboard';loadDemos();render()">← Back</button>
          </div>
        </div>
        <div class="editor-layout">
          <div class="card" style="padding:0;overflow:hidden;border-radius:10px;position:relative">
            <video id="vp" src="${src}" preload="metadata" muted playsinline style="display:none"></video>
            <canvas id="preview" style="width:100%;display:block;background:#000;border-radius:10px"></canvas>
            <div id="vp-overlay" style="position:absolute;bottom:0;left:0;right:0;padding:8px 12px;display:flex;align-items:center;gap:12px;background:linear-gradient(transparent,rgba(0,0,0,0.7))">
              <button id="vp-play" class="btn btn-sm" style="background:rgba(255,255,255,0.15);color:#fff;padding:6px 12px" onclick="togglePlay()">▶</button>
              <span id="vp-time" style="font-size:12px;color:#ccc;font-family:'SF Mono',monospace">0:00.0</span>
            </div>
          </div>

          <div class="flex-between" style="padding:4px 0">
            <span class="playback-time" id="time-display">${fmtTime(0)} / ${fmtTime(S.totalOutputDur)}</span>
            <span style="font-size:11px;color:#555">${S.totalInputDur.toFixed(1)}s raw → ${S.totalOutputDur.toFixed(1)}s edited</span>
          </div>

          <!-- Timeline -->
          <div class="card" style="padding:12px 12px 8px">
            <div class="flex-between" style="margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:12px">
                <div style="display:flex;align-items:center;gap:6px">
                  <span style="font-size:11px;color:#555">Zoom</span>
                  <input type="range" id="tl-zoom" min="8" max="80" value="20" style="width:100px;accent-color:#4f8ff7" oninput="onZoomChange(this.value)">
                </div>
                <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0;font-size:11px;color:#888">
                  <input type="checkbox" ${S.showCuts?'checked':''} onchange="S.showCuts=this.checked;resizeTimeline();buildTimeMarkers();drawTimeline();drawZoomTrack()" style="accent-color:#4f8ff7"> Show cuts
                </label>
                <label style="display:flex;align-items:center;gap:4px;cursor:pointer;margin:0;font-size:11px;color:#888">
                  <input type="checkbox" ${S.motionBlur?'checked':''} onchange="S.motionBlur=this.checked" style="accent-color:#4f8ff7"> Motion blur
                </label>
                <button class="btn btn-sm" style="padding:4px 10px;font-size:11px;${S.splitMode?'background:#dc2626;color:white;border-color:#dc2626':'background:#222;color:#ccc;border:1px solid #333'}" onclick="toggleSplitMode()">✂ Split</button>
              </div>
            </div>
            <div id="tl-scroll" style="overflow-x:auto;overflow-y:hidden;position:relative;border-radius:6px;background:#111;padding:4px 0">
              <div id="tl-markers" style="position:relative;height:18px;pointer-events:none"></div>
              <canvas id="timeline" height="52" style="display:block;cursor:pointer"></canvas>
              <canvas id="zoom-track" height="36" style="display:block;cursor:pointer;margin-top:4px"></canvas>
            </div>
          </div>

          <!-- Segment / Zoom editor panel -->
          <div id="seg-panel"></div>

          <!-- Export bar -->
          <div class="flex-between">
            <button class="btn btn-secondary btn-sm" onclick="reExport()">Re-export edited video</button>
            <div style="display:flex;gap:8px;align-items:center">
              <select id="export-format" style="width:auto;padding:6px 12px;font-size:13px;border-radius:6px;background:#1a1a1a;border:1px solid #333;color:#ccc">
                <option value="mp4">MP4</option>
                <option value="webm">WebM</option>
                <option value="mp4-social">Square (1080×1080)</option>
                <option value="mp4-story">Story (1080×1920)</option>
                <option value="gif">GIF</option>
              </select>
              <button class="btn btn-primary btn-sm" onclick="exportVideo('${d.id}')">↓ Export</button>
            </div>
          </div>
        </div>`;
    }

    function renderSettings() {
      return `
        <div class="modal-overlay" onclick="if(event.target===this){S.view='dashboard';render()}">
          <div class="modal">
            <h2>Settings</h2>
            <div class="mb"><label>Anthropic API Key</label>
              <input type="text" id="input-apikey" placeholder="sk-ant-..." value="${S.config.anthropicApiKey || ''}" /></div>
            <div class="actions">
              <button class="btn btn-secondary" onclick="S.view='dashboard';render()">Cancel</button>
              <button class="btn btn-primary" onclick="saveSettings()">Save</button>
            </div>
          </div>
        </div>`;
    }

    // ── Timeline Canvas ──
    let _tlCtx = null, _tlCanvas = null, _tlPPS = 20;
    let _dragging = null;
    let _stickyPlayhead = false; // Playhead follows mouse X until segment click

    // Compute layout: each segment gets an x position and width in output time
    function getSegLayout() {
      const layout = [];
      let x = 0;
      for (let i = 0; i < S.edl.length; i++) {
        const seg = S.edl[i];
        const inputDur = seg.endSec - seg.startSec;
        let outDur;
        if (seg.type === 'cut') {
          outDur = S.showCuts ? inputDur * 0.15 : 0; // Thin sliver or hidden
        } else {
          outDur = seg.speed > 0 ? inputDur / seg.speed : 0;
        }
        layout.push({ idx: i, x, w: outDur, seg });
        x += outDur;
      }
      return { layout, totalW: x };
    }

    // Map a pixel X on the timeline to an input (raw video) time
    function tlXtoInputTime(px) {
      const sec = px / _tlPPS;
      const { layout } = getSegLayout();
      let acc = 0;
      for (const l of layout) {
        if (sec <= acc + l.w) {
          const frac = l.w > 0 ? (sec - acc) / l.w : 0;
          const inputDur = l.seg.endSec - l.seg.startSec;
          return l.seg.startSec + frac * inputDur;
        }
        acc += l.w;
      }
      return S.totalInputDur;
    }

    // Map input time to pixel X on the timeline
    function inputTimeToTlX(inputSec) {
      const { layout } = getSegLayout();
      for (const l of layout) {
        if (inputSec >= l.seg.startSec && inputSec <= l.seg.endSec) {
          const frac = (l.seg.endSec - l.seg.startSec) > 0
            ? (inputSec - l.seg.startSec) / (l.seg.endSec - l.seg.startSec) : 0;
          return (l.x + frac * l.w) * _tlPPS;
        }
      }
      return 0;
    }

    function onZoomChange(val) {
      _tlPPS = parseFloat(val);
      resizeTimeline();
      buildTimeMarkers();
      drawTimeline();
    }

    function resizeTimeline() {
      if (!_tlCanvas) return;
      const { totalW } = getSegLayout();
      _tlCanvas.width = Math.ceil(totalW * _tlPPS);
    }

    // ── Canvas Preview Engine ──
    let _playing = false;
    let _prevPanX = 0, _prevPanY = 0, _prevZoom = 1; // For motion blur velocity tracking
    let _rafId = null;

    function initPreview() {
      const video = document.getElementById('vp');
      const canvas = document.getElementById('preview');
      if (!video || !canvas) return;

      video.addEventListener('loadedmetadata', () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        renderPreviewFrame();
      });

      // When video seeks (from playhead drag), render the frame
      video.addEventListener('seeked', () => {
        renderPreviewFrame();
      });

      // Click on preview → create zoom at that spot
      canvas.style.cursor = 'crosshair';
      canvas.onclick = (e) => {
        const rect = canvas.getBoundingClientRect();
        // Map click position from display size to video coordinates
        const displayW = rect.width;
        const displayH = rect.height;
        const videoW = canvas.width || 1;
        const videoH = canvas.height || 1;
        const clickVX = (e.clientX - rect.left) / displayW * videoW;
        const clickVY = (e.clientY - rect.top) / displayH * videoH;

        // Convert video coordinates to the agent's 1024x768 space
        const cx = Math.round(clickVX / videoW * 1024);
        const cy = Math.round(clickVY / videoH * 768);

        // Create a zoom region at the current playhead position
        const t = S.playheadSec;
        const newZoom = {
          startSec: Math.max(0, t - 0.5),
          endSec: t + 2.5,
          zoomLevel: 1.5,
          cx,
          cy,
          auto: false,
        };

        S.zoomRegions.push(newZoom);
        S.zoomRegions.sort((a, b) => a.startSec - b.startSec);
        S.selectedZoom = S.zoomRegions.indexOf(newZoom);
        S.selectedSeg = -1;

        drawTimeline();
        drawZoomTrack();
        updateSegPanel();
        renderPreviewFrame(); // Show the zoom immediately
      };
    }

    function renderPreviewFrame() {
      const video = document.getElementById('vp');
      const canvas = document.getElementById('preview');
      if (!video || !canvas || video.readyState < 2) return;
      const ctx = canvas.getContext('2d');
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      if (!vw || !vh) return;

      // Ensure canvas size matches
      if (canvas.width !== vw) canvas.width = vw;
      if (canvas.height !== vh) canvas.height = vh;

      const t = video.currentTime;

      const scaleX = vw / 1024;
      const scaleY = vh / 768;

      // ── Simple zoom model ──
      // For each zoom region, compute a weight (0-1) based on proximity.
      // Blend all active/nearby regions. Camera never "jumps".

      const sorted = [...S.zoomRegions].sort((a, b) => a.startSec - b.startSec);
      const FADE = 0.8; // seconds to fade in/out each region

      // Accumulate weighted zoom target from all regions
      let totalWeight = 0;
      let weightedZ = 0;
      let weightedX = 0;
      let weightedY = 0;

      for (const zr of sorted) {
        let w = 0;

        if (t >= zr.startSec && t <= zr.endSec) {
          // Inside the region — fade in/out within the block boundaries
          const dur = zr.endSec - zr.startSec;
          const fadeIn = Math.min(FADE, dur * 0.3);
          const fadeOut = Math.min(FADE, dur * 0.3);
          const holdStart = zr.startSec + fadeIn;
          const holdEnd = zr.endSec - fadeOut;

          if (t < holdStart) {
            w = (t - zr.startSec) / fadeIn; // 0→1 during fade in
          } else if (t > holdEnd) {
            w = (zr.endSec - t) / fadeOut;  // 1→0 during fade out
          } else {
            w = 1; // Fully zoomed in the middle
          }

          // Cosine smooth
          if (w > 0 && w < 1) w = 0.5 - 0.5 * Math.cos(Math.PI * w);
        }

        if (w > 0.001) {
          const cx = zr.cx * scaleX;
          const cy = zr.cy * scaleY;
          weightedZ += (zr.zoomLevel - 1) * w;
          weightedX += (cx - vw / 2) * w;
          weightedY += (cy - vh / 2) * w;
          totalWeight += w;
        }
      }

      // Blend: if multiple regions overlap, normalize
      let effectiveZ, panX, panY;
      if (totalWeight > 0.001) {
        // Clamp total weight to 1 so we don't over-zoom when regions overlap
        const clampedW = Math.min(totalWeight, 1);
        const norm = clampedW / totalWeight;
        effectiveZ = 1 + weightedZ * norm;
        panX = vw / 2 + weightedX * norm;
        panY = vh / 2 + weightedY * norm;
      } else {
        effectiveZ = 1;
        panX = vw / 2;
        panY = vh / 2;
      }

      // Apply zoom: crop around (panX, panY) and scale up
      const cropW = vw / effectiveZ;
      const cropH = vh / effectiveZ;
      let sx = panX - cropW / 2;
      let sy = panY - cropH / 2;
      // Clamp to video bounds
      sx = Math.max(0, Math.min(sx, vw - cropW));
      sy = Math.max(0, Math.min(sy, vh - cropH));

      // Directional motion blur — exaggerate the camera velocity to create
      // visible smear. The single-frame delta is tiny, so we amplify it.
      const velX = panX - _prevPanX;
      const velY = panY - _prevPanY;
      const velZ = effectiveZ - _prevZoom;
      const panSpeed = Math.sqrt(velX * velX + velY * velY);
      const hasMotion = S.motionBlur && (panSpeed > 0.5 || Math.abs(velZ) > 0.005);

      if (hasMotion) {
        const blurAmount = 40;
        const spreadX = velX * blurAmount;
        const spreadY = velY * blurAmount;
        const spreadZ = velZ * blurAmount;
        const samples = 18;

        // Draw sharp frame first at full brightness
        ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, vw, vh);

        // Overlay blurred samples on top at low opacity
        for (let i = 0; i < samples; i++) {
          const frac = (i / (samples - 1)) - 0.5;
          if (Math.abs(frac) < 0.05) continue; // Skip center (already drawn sharp)

          const samplePanX = panX + spreadX * frac;
          const samplePanY = panY + spreadY * frac;
          const sampleZ = Math.max(1, effectiveZ + spreadZ * frac);

          const sCropW = vw / sampleZ;
          const sCropH = vh / sampleZ;
          let sSx = samplePanX - sCropW / 2;
          let sSy = samplePanY - sCropH / 2;
          sSx = Math.max(0, Math.min(sSx, vw - sCropW));
          sSy = Math.max(0, Math.min(sSy, vh - sCropH));

          ctx.globalAlpha = 0.5 * (1 - Math.abs(frac));
          ctx.drawImage(video, sSx, sSy, sCropW, sCropH, 0, 0, vw, vh);
        }
        ctx.globalAlpha = 1.0;
      } else {
        ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, vw, vh);
      }

      _prevPanX = panX;
      _prevPanY = panY;
      _prevZoom = effectiveZ;
    }

    // Find the next keepable time at or after the given time
    // Skips through any consecutive cut segments
    function findNextKeepTime(timeSec) {
      if (S.showCuts) return timeSec; // Show cuts mode = play everything
      // Walk through EDL segments in order
      for (const seg of S.edl) {
        if (seg.endSec <= timeSec) continue; // Already past this segment
        if (seg.type === 'keep') {
          // We're in or before a keep segment
          return Math.max(timeSec, seg.startSec);
        }
        // It's a cut segment that overlaps timeSec — skip to its end
        // and continue checking (next segment might also be cut)
        timeSec = seg.endSec;
      }
      return timeSec;
    }

    let _skipLock = false; // Prevent re-entrant skipping

    // Animation loop for playback
    function startRenderLoop() {
      function tick() {
        if (!_playing) return;
        const v = document.getElementById('vp');
        if (v && !_skipLock) {
          const t = v.currentTime;
          const keepTime = findNextKeepTime(t);
          if (keepTime > t + 0.05) {
            // Need to skip — jump forward
            _skipLock = true;
            v.currentTime = keepTime;
            S.playheadSec = keepTime;
            // Wait for seek to complete before continuing
            v.addEventListener('seeked', () => {
              _skipLock = false;
            }, { once: true });
          }
        }
        renderPreviewFrame();
        if (v) {
          S.playheadSec = v.currentTime;
          const t = document.getElementById('vp-time');
          if (t) t.textContent = fmtTime(v.currentTime);
          drawTimeline();
          updateTimeDisplay();
        }
        _rafId = requestAnimationFrame(tick);
      }
      _rafId = requestAnimationFrame(tick);
    }

    function seekVideo(timeSec) {
      const v = document.getElementById('vp');
      if (!v) return;
      v.pause();
      v.currentTime = timeSec;
      const t = document.getElementById('vp-time');
      if (t) t.textContent = fmtTime(timeSec);
      const btn = document.getElementById('vp-play');
      if (btn) btn.textContent = '▶';
      _playing = false;
      if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
      // Frame will render via 'seeked' event
    }

    function togglePlay() {
      const v = document.getElementById('vp');
      if (!v) return;
      const btn = document.getElementById('vp-play');
      if (_playing) {
        v.pause();
        _playing = false;
        if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
        if (btn) btn.textContent = '▶';
        renderPreviewFrame();
      } else {
        // If starting from a cut section, skip to next keep
        if (!S.showCuts) {
          const keepTime = findNextKeepTime(v.currentTime);
          if (keepTime > v.currentTime + 0.05) {
            v.currentTime = keepTime;
            S.playheadSec = keepTime;
          }
        }
        v.play();
        _playing = true;
        if (btn) btn.textContent = '⏸';
        startRenderLoop();
      }
    }

    function initTimeline() {
      const canvas = document.getElementById('timeline');
      const scroll = document.getElementById('tl-scroll');
      // Video is looked up fresh via seekVideo() and direct getElementById
      if (!canvas || !S.edl.length) return;

      _tlCanvas = canvas;
      _tlCtx = canvas.getContext('2d');
      canvas.height = 52;
      resizeTimeline();
      buildTimeMarkers();
      drawTimeline();
      updateSegPanel();

      // Mouse events — positions mapped through output-time layout
      canvas.onmousedown = (e) => {
        const mx = e.offsetX;
        const phX = inputTimeToTlX(S.playheadSec);
        const { layout } = getSegLayout();

        // If in sticky mode, clicking a segment exits it
        if (_stickyPlayhead) {
          let found = -1;
          for (const l of layout) {
            const lx = l.x * _tlPPS;
            const rx = (l.x + l.w) * _tlPPS;
            if (mx >= lx && mx < rx) { found = l.idx; break; }
          }
          if (found >= 0) {
            _stickyPlayhead = false;
            S.selectedSeg = found;
            S.selectedZoom = -1;
            canvas.style.cursor = 'pointer';
            drawTimeline();
            updateSegPanel();
          }
          return;
        }

        // Split mode: click to split a segment at this point
        if (S.splitMode) {
          const inputSec = tlXtoInputTime(mx);
          let found = -1;
          for (let i = 0; i < S.edl.length; i++) {
            if (inputSec >= S.edl[i].startSec && inputSec < S.edl[i].endSec) { found = i; break; }
          }
          if (found >= 0) {
            splitSegment(found, inputSec);
            S.splitMode = false;
            canvas.style.cursor = 'pointer';
            render(); // Re-render to update split button state
          }
          return;
        }

        // Click the playhead circle? Enter sticky mode
        if (Math.abs(mx - phX) < 10) {
          const my = e.offsetY;
          if (my < 15) { // Near the top circle
            _stickyPlayhead = true;
            canvas.style.cursor = 'col-resize';
            e.preventDefault();
            return;
          }
          // Otherwise normal drag
          _dragging = 'playhead';
          canvas.style.cursor = 'col-resize';
          e.preventDefault();
          return;
        }

        // Near a segment edge?
        for (const l of layout) {
          const lx = l.x * _tlPPS;
          const rx = (l.x + l.w) * _tlPPS;
          if (Math.abs(mx - lx) < 6 && l.idx > 0) {
            _dragging = { type: 'edge', seg: l.idx, side: 'left' };
            canvas.style.cursor = 'col-resize';
            e.preventDefault();
            return;
          }
          if (Math.abs(mx - rx) < 6 && l.idx < S.edl.length - 1) {
            _dragging = { type: 'edge', seg: l.idx, side: 'right' };
            canvas.style.cursor = 'col-resize';
            e.preventDefault();
            return;
          }
        }

        // Click: select segment + move playhead
        const inputSec = tlXtoInputTime(mx);
        let found = -1;
        for (const l of layout) {
          const lx = l.x * _tlPPS;
          const rx = (l.x + l.w) * _tlPPS;
          if (mx >= lx && mx < rx) { found = l.idx; break; }
        }
        S.selectedSeg = found;
        S.selectedZoom = -1; // Deselect zoom when clicking clip
        S.playheadSec = inputSec;
        _playing = false;
        seekVideo(inputSec);
        drawTimeline();
        updateSegPanel();
        updateTimeDisplay();
      };

      canvas.onmousemove = (e) => {
        const mx = e.offsetX;

        // Split mode cursor
        if (S.splitMode) {
          canvas.style.cursor = 'crosshair';
          return;
        }

        // Sticky playhead mode: follow mouse X
        if (_stickyPlayhead) {
          const inputSec = tlXtoInputTime(mx);
          S.playheadSec = Math.max(0, Math.min(inputSec, S.totalInputDur));
          seekVideo(S.playheadSec);
          drawTimeline();
          updateTimeDisplay();
          canvas.style.cursor = 'col-resize';
          return;
        }

        if (!_dragging) {
          const { layout } = getSegLayout();
          let nearEdge = false;
          for (const l of layout) {
            const lx = l.x * _tlPPS;
            const rx = (l.x + l.w) * _tlPPS;
            if (Math.abs(mx - lx) < 6 || Math.abs(mx - rx) < 6) { nearEdge = true; break; }
          }
          const phX = inputTimeToTlX(S.playheadSec);
          canvas.style.cursor = (nearEdge || Math.abs(mx - phX) < 10) ? 'col-resize' : 'pointer';
          return;
        }

        if (_dragging === 'playhead') {
          const inputSec = tlXtoInputTime(mx);
          S.playheadSec = Math.max(0, Math.min(inputSec, S.totalInputDur));
          _playing = false;
          seekVideo(S.playheadSec);
          drawTimeline();
          updateTimeDisplay();
        }

        if (_dragging && _dragging.type === 'edge') {
          const inputSec = tlXtoInputTime(mx);
          const { seg: idx, side } = _dragging;
          const seg = S.edl[idx];
          const MIN_DUR = 0.1;
          if (side === 'left' && idx > 0) {
            const prev = S.edl[idx - 1];
            const newStart = Math.max(prev.startSec + MIN_DUR, Math.min(inputSec, seg.endSec - MIN_DUR));
            prev.endSec = newStart;
            seg.startSec = newStart;
          } else if (side === 'right' && idx < S.edl.length - 1) {
            const next = S.edl[idx + 1];
            const newEnd = Math.max(seg.startSec + MIN_DUR, Math.min(inputSec, next.endSec - MIN_DUR));
            seg.endSec = newEnd;
            next.startSec = newEnd;
          }
          recalcDurations();
          resizeTimeline();
          drawTimeline();
          updateSegPanel();
          updateTimeDisplay();
        }
      };

      const stopDrag = () => {
        _dragging = null;
        if (!_stickyPlayhead && canvas) canvas.style.cursor = 'pointer';
      };
      canvas.onmouseup = stopDrag;
      // Don't stop sticky mode on mouse leave — only on segment click
      canvas.onmouseleave = () => {
        if (!_stickyPlayhead) stopDrag();
      };

      // Sync playhead when video is playing
      const v0 = document.getElementById('vp');
      if (v0) {
        v0.ontimeupdate = () => {
          if (_dragging) return;
          // Skip cuts during playback
          if (_playing && !_skipLock && !S.showCuts) {
            const keepTime = findNextKeepTime(v0.currentTime);
            if (keepTime > v0.currentTime + 0.05) {
              _skipLock = true;
              v0.currentTime = keepTime;
              v0.addEventListener('seeked', () => { _skipLock = false; }, { once: true });
              return;
            }
          }
          S.playheadSec = v0.currentTime;
          if (!_playing) {
            drawTimeline();
            updateTimeDisplay();
          }
        };
        v0.onended = () => {
          _playing = false;
          if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
          const btn = document.getElementById('vp-play');
          if (btn) btn.textContent = '▶';
        };
        // Set initial frame
        v0.currentTime = S.playheadSec || 0;
      }
    }

    function updateTimeDisplay() {
      const td = document.getElementById('time-display');
      if (td) {
        const outTime = inputToOutputTime(S.playheadSec);
        td.textContent = `${fmtTime(outTime)} / ${fmtTime(S.totalOutputDur)}`;
      }
    }

    function buildTimeMarkers() {
      const el = document.getElementById('tl-markers');
      if (!el) return;
      const { totalW } = getSegLayout();
      const pps = _tlPPS;
      const pixW = Math.ceil(totalW * pps);
      let html = '';
      const secPerLabel = Math.max(1, Math.round(80 / pps));
      for (let t = 0; t <= totalW; t += secPerLabel) {
        const x = t * pps;
        html += `<span style="position:absolute;left:${x}px;top:0;font-size:9px;color:#555;font-family:'SF Mono',monospace;white-space:nowrap">${fmtTime(t)}</span>`;
      }
      for (let t = 0; t <= totalW; t += 1) {
        html += `<span style="position:absolute;left:${t*pps}px;top:14px;width:1px;height:3px;background:#333"></span>`;
      }
      el.style.width = pixW + 'px';
      el.innerHTML = html;
    }

    function drawTimeline() {
      const ctx = _tlCtx, canvas = _tlCanvas;
      if (!ctx || !canvas) return;
      const w = canvas.width, h = canvas.height;
      const pps = _tlPPS;
      ctx.clearRect(0, 0, w, h);

      const { layout } = getSegLayout();
      const CY = 2, CH = h - 4, R = 5, EDGE_W = 4;

      for (const l of layout) {
        const seg = l.seg;
        const x = Math.round(l.x * pps);
        const sw = Math.round(l.w * pps);
        if (sw < 1) continue;
        const sel = l.idx === S.selectedSeg;

        let fill;
        if (seg.type === 'cut') {
          fill = sel ? '#2d1a1a' : '#181010';
        } else {
          fill = sel ? '#c2710e' : '#9a5a0a';
        }

        ctx.beginPath();
        ctx.roundRect(x + 1, CY, Math.max(sw - 2, 2), CH, R);
        ctx.fillStyle = fill;
        ctx.fill();

        if (sel) {
          ctx.strokeStyle = '#f0c040';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Edge handles
        if (sw > 12) {
          ctx.fillStyle = sel ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.1)';
          ctx.fillRect(x + 2, CY + 4, EDGE_W, CH - 8);
          ctx.fillRect(x + sw - EDGE_W - 2, CY + 4, EDGE_W, CH - 8);
        }

        // Label
        if (sw > 55) {
          ctx.fillStyle = seg.type === 'cut' ? '#553333' : 'rgba(255,255,255,0.4)';
          ctx.font = '9px -apple-system, sans-serif';
          ctx.fillText(seg.label, x + 10, CY + 14);
        }

        // Duration + speed
        if (sw > 30) {
          const inputDur = seg.endSec - seg.startSec;
          const outDur = seg.type === 'cut' ? 0 : (seg.speed > 0 ? inputDur / seg.speed : 0);
          const txt = seg.type === 'cut' ? `✂` : `${outDur.toFixed(1)}s · ${seg.speed}x`;
          ctx.fillStyle = seg.type === 'cut' ? '#884444' : '#fff';
          ctx.font = 'bold 10px -apple-system, sans-serif';
          const tw = ctx.measureText(txt).width;
          ctx.fillText(txt, x + Math.max(10, (sw - tw) / 2), CY + CH - 6);
        }
      }

      // Playhead — map input time to timeline X
      const px = Math.round(inputTimeToTlX(S.playheadSec));
      ctx.fillStyle = '#4f8ff7';
      ctx.fillRect(px - 1, 0, 2, h);
      ctx.beginPath();
      ctx.arc(px, 3, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#4f8ff7';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Also redraw zoom track
      drawZoomTrack();
    }

    function updateSegPanel() {
      const panel = document.getElementById('seg-panel');
      if (!panel) return;

      // Zoom region selected?
      const zr = S.zoomRegions[S.selectedZoom];
      if (zr) {
        panel.innerHTML = `
          <div class="segment-panel" style="border-color:#6366f1">
            <div class="flex-between">
              <h3 style="color:#a5b4fc">Zoom Region ${zr.auto ? '(Auto)' : ''}</h3>
              <span class="time-label">${fmtTime(zr.startSec)} → ${fmtTime(zr.endSec)} &nbsp; (${(zr.endSec-zr.startSec).toFixed(1)}s)</span>
            </div>
            <div style="display:flex;gap:12px;margin-top:12px;align-items:center;flex-wrap:wrap">
              <div>
                <label>Zoom Level</label>
                <div style="display:flex;gap:6px;margin-top:4px">
                  ${[1.5, 2.0, 2.5, 3.0, 4.0].map(z => `<button class="speed-btn ${Math.abs(zr.zoomLevel-z)<0.1?'active':''}" onclick="setZoomLevel(${S.selectedZoom},${z})" style="${Math.abs(zr.zoomLevel-z)<0.1?'background:#6366f1;border-color:#6366f1':''}">${z}x</button>`).join('')}
                </div>
              </div>
              <div>
                <label>Center: (${zr.cx}, ${zr.cy})</label>
              </div>
              <button class="speed-btn cut" onclick="removeZoomRegion(${S.selectedZoom})" style="margin-left:auto">Remove</button>
            </div>
          </div>`;
        return;
      }

      // Clip segment selected?
      const seg = S.edl[S.selectedSeg];
      if (!seg) {
        panel.innerHTML = `<div class="segment-panel" style="text-align:center;color:#555;padding:20px;font-size:13px">Click a clip or zoom region to edit it</div>`;
        return;
      }
      const dur = seg.endSec - seg.startSec;
      panel.innerHTML = `
        <div class="segment-panel">
          <div class="flex-between">
            <h3>${escHtml(seg.label)}</h3>
            <span class="time-label">${fmtTime(seg.startSec)} → ${fmtTime(seg.endSec)} &nbsp; (${dur.toFixed(1)}s)</span>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center">
            <button class="speed-btn ${seg.type==='keep' && seg.speed===1 ? 'active' : ''}" onclick="setSegSpeed(${S.selectedSeg},1,'keep')" style="${seg.type==='keep' ? '' : 'background:#1a3a1a;border-color:#2d5a2d;color:#4ade80'}">Keep</button>
            ${[0.5, 1.5, 2, 4].map(sp => `<button class="speed-btn ${seg.speed===sp && seg.type==='keep'?'active':''}" onclick="setSegSpeed(${S.selectedSeg},${sp},'keep')">${sp}x</button>`).join('')}
            <button class="speed-btn cut ${seg.type==='cut'?'active':''}" onclick="setSegSpeed(${S.selectedSeg},0,'cut')">✂ Cut</button>
          </div>
        </div>`;
    }

    // ── Zoom Track ──
    function drawZoomTrack() {
      const canvas = document.getElementById('zoom-track');
      if (!canvas) return;
      const { layout, totalW } = getSegLayout();
      const pps = _tlPPS;
      canvas.width = Math.ceil(totalW * pps);
      const ctx = canvas.getContext('2d');
      const h = canvas.height;
      ctx.clearRect(0, 0, canvas.width, h);

      // Background
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, canvas.width, h);

      for (let i = 0; i < S.zoomRegions.length; i++) {
        const zr = S.zoomRegions[i];
        const x1 = inputTimeToTlX(zr.startSec);
        const x2 = inputTimeToTlX(zr.endSec);
        const w = x2 - x1;
        if (w < 2) continue;

        const sel = i === S.selectedZoom;

        // Purple zoom block
        ctx.beginPath();
        ctx.roundRect(x1 + 1, 2, w - 2, h - 4, 5);
        ctx.fillStyle = sel ? '#6366f1' : '#4f46e5';
        ctx.fill();

        if (sel) {
          ctx.strokeStyle = '#a5b4fc';
          ctx.lineWidth = 2;
          ctx.stroke();
        }

        // Edge handles
        if (w > 12) {
          ctx.fillStyle = 'rgba(255,255,255,0.2)';
          ctx.fillRect(x1 + 2, 6, 3, h - 12);
          ctx.fillRect(x1 + w - 5, 6, 3, h - 12);
        }

        // Label
        if (w > 40) {
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.font = '9px -apple-system, sans-serif';
          ctx.fillText('Zoom', x1 + 8, 14);
        }
        if (w > 25) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px -apple-system, sans-serif';
          const txt = `${zr.zoomLevel}x${zr.auto ? ' · Auto' : ''}`;
          const tw = ctx.measureText(txt).width;
          ctx.fillText(txt, x1 + Math.max(6, (w - tw) / 2), h - 7);
        }
      }

      // Playhead line
      const px = Math.round(inputTimeToTlX(S.playheadSec));
      ctx.fillStyle = '#4f8ff7';
      ctx.fillRect(px - 1, 0, 2, h);
    }

    function initZoomTrack() {
      const canvas = document.getElementById('zoom-track');
      if (!canvas) return;
      drawZoomTrack();

      canvas.onmousedown = (e) => {
        const mx = e.offsetX;
        const inputSec = tlXtoInputTime(mx);

        // Check if clicking on a zoom region
        let found = -1;
        for (let i = 0; i < S.zoomRegions.length; i++) {
          const zr = S.zoomRegions[i];
          const x1 = inputTimeToTlX(zr.startSec);
          const x2 = inputTimeToTlX(zr.endSec);

          // Edge drag
          if (Math.abs(mx - x1) < 6) {
            _dragging = { type: 'zoom-edge', idx: i, side: 'left' };
            canvas.style.cursor = 'col-resize';
            return;
          }
          if (Math.abs(mx - x2) < 6) {
            _dragging = { type: 'zoom-edge', idx: i, side: 'right' };
            canvas.style.cursor = 'col-resize';
            return;
          }

          if (mx >= x1 && mx <= x2) { found = i; break; }
        }

        S.selectedZoom = found;
        S.selectedSeg = -1; // Deselect clip
        drawTimeline();
        drawZoomTrack();
        updateSegPanel();
      };

      canvas.onmousemove = (e) => {
        const mx = e.offsetX;
        if (!_dragging) {
          let nearEdge = false;
          for (const zr of S.zoomRegions) {
            const x1 = inputTimeToTlX(zr.startSec);
            const x2 = inputTimeToTlX(zr.endSec);
            if (Math.abs(mx - x1) < 6 || Math.abs(mx - x2) < 6) { nearEdge = true; break; }
          }
          canvas.style.cursor = nearEdge ? 'col-resize' : 'pointer';
          return;
        }

        if (_dragging?.type === 'zoom-edge') {
          const inputSec = tlXtoInputTime(mx);
          const zr = S.zoomRegions[_dragging.idx];
          if (_dragging.side === 'left') {
            zr.startSec = Math.max(0, Math.min(inputSec, zr.endSec - 0.2));
          } else {
            zr.endSec = Math.max(zr.startSec + 0.2, Math.min(inputSec, S.totalInputDur));
          }
          zr.auto = false;
          drawZoomTrack();
          updateSegPanel();
        }
      };

      canvas.onmouseup = () => { _dragging = null; canvas.style.cursor = 'pointer'; };
      canvas.onmouseleave = () => { _dragging = null; canvas.style.cursor = 'pointer'; };
    }

    function setZoomLevel(idx, level) {
      if (idx < 0 || idx >= S.zoomRegions.length) return;
      S.zoomRegions[idx].zoomLevel = level;
      S.zoomRegions[idx].auto = false;
      drawZoomTrack();
      updateSegPanel();
      debounceSave();
    }

    function removeZoomRegion(idx) {
      S.zoomRegions.splice(idx, 1);
      S.selectedZoom = -1;
      drawZoomTrack();
      updateSegPanel();
      debounceSave();
    }

    // ── Persist edits ──
    async function saveDemoName(name) {
      const d = S.activeDemo;
      if (!d) return;
      d.name = name;
      await api(`/demo/${d.id}/metadata`, { method: 'PUT', body: { name } });
    }

    async function saveEdits() {
      const d = S.activeDemo;
      if (!d) return;
      await api(`/demo/${d.id}/metadata`, {
        method: 'PUT',
        body: {
          name: d.name,
          edl: S.edl,
          zoomRegions: S.zoomRegions,
          motionBlur: S.motionBlur,
        },
      });
    }

    // ── Segment editing ──
    function setSegSpeed(idx, speed, type) {
      if (idx < 0 || idx >= S.edl.length) return;
      S.edl[idx].type = type;
      S.edl[idx].speed = speed;
      recalcDurations();
      resizeTimeline();
      buildTimeMarkers();
      drawTimeline();
      updateSegPanel();
      updateTimeDisplay();
      debounceSave();
    }

    let _saveTimer = null;
    function debounceSave() {
      if (_saveTimer) clearTimeout(_saveTimer);
      _saveTimer = setTimeout(() => saveEdits(), 1000);
    }

    function splitSegment(idx, atTimeSec) {
      const seg = S.edl[idx];
      if (!seg) return;
      if (atTimeSec <= seg.startSec + 0.1 || atTimeSec >= seg.endSec - 0.1) return;

      const newSeg = {
        startSec: atTimeSec,
        endSec: seg.endSec,
        type: seg.type,
        speed: seg.speed,
        label: seg.label + ' (split)',
      };
      seg.endSec = atTimeSec;

      S.edl.splice(idx + 1, 0, newSeg);
      recalcDurations();
      S.selectedSeg = idx + 1;
      resizeTimeline();
      buildTimeMarkers();
      drawTimeline();
      updateSegPanel();
      debounceSave();
    }

    function toggleSplitMode() {
      S.splitMode = !S.splitMode;
      const canvas = document.getElementById('timeline');
      if (canvas) canvas.style.cursor = S.splitMode ? 'crosshair' : 'pointer';
      render(); // Re-render to update button state
    }

    async function reExport() {
      // TODO: send modified EDL to server for re-export
      // For now, just trigger the existing auto-edit
      const d = S.activeDemo;
      if (!d) return;
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Exporting...';
      try {
        await api(`/demo/${d.id}/re-edit`, { method: 'POST' });
        d.editedVideo = `/api/demo/${d.id}/video/edited`;
        S.activeVideoType = 'edited';
        render();
      } catch (err) {
        alert('Export failed');
      }
    }

    // ── Actions ──
    async function startDemo() {
      const url = document.getElementById('input-url').value.trim();
      const instructions = document.getElementById('input-instructions').value.trim();
      if (!url) return alert('Enter a URL or project path');
      const isPath = url.startsWith('/') || url.startsWith('~') || url.startsWith('.');
      const res = await api('/demo', { method: 'POST', body: {
        task: instructions || 'Explore the website and demonstrate its features',
        url: isPath ? undefined : url,
        projectPath: isPath ? url : undefined,
        model: 'claude-opus-4-6',
        instructions,
      }});
      if (res.error) return alert(res.error);
      S.activeDemo = { id: res.id, status: 'recording', task: instructions || 'Demo', log: [], startedAt: Date.now() };
      S.view = 'progress';
      render();
    }

    async function openDemo(id) {
      const d = await api(`/demo/${id}`);
      S.activeDemo = d;
      if (!d.rawVideo?.startsWith('/api')) d.rawVideo = `/api/demo/${id}/video/raw`;
      if (d.editedVideo && !d.editedVideo.startsWith('/api')) d.editedVideo = `/api/demo/${id}/video/edited`;
      S.selectedSeg = -1;
      S.playheadSec = 0;
      await loadEDL(id);
      S.view = 'editor';
      render();
    }

    async function exportVideo(demoId) {
      const format = document.getElementById('export-format').value;
      const btn = event.target;
      btn.disabled = true;
      btn.textContent = 'Exporting...';
      try {
        // First re-export with current EDL
        await api(`/demo/${demoId}/re-edit`, { method: 'POST' });

        if (format === 'mp4') {
          const a = document.createElement('a');
          a.href = `/api/demo/${demoId}/video/edited`;
          a.download = 'demo.mp4';
          a.click();
        } else {
          // Convert to other format
          const res = await api(`/demo/${demoId}/export`, {
            method: 'POST',
            body: { format, source: 'edited' },
          });
          if (res.downloadUrl) {
            const ext = format === 'gif' ? 'gif' : format.includes('webm') ? 'webm' : 'mp4';
            const a = document.createElement('a');
            a.href = res.downloadUrl;
            a.download = `demo.${ext}`;
            a.click();
          } else if (res.error) {
            alert(res.error);
          }
        }
      } catch (err) {
        alert('Export failed');
      } finally {
        btn.disabled = false;
        btn.textContent = '↓ Export';
      }
    }

    async function saveSettings() {
      await api('/config', { method: 'PUT', body: { anthropicApiKey: document.getElementById('input-apikey').value.trim(), defaultModel: 'claude-opus-4-6' }});
      S.config = await api('/config');
      S.view = 'dashboard'; render();
    }

    async function loadDemos() { S.demos = await api('/demos'); }

    async function deleteDemo(id) {
      if (!confirm('Delete this demo and all its files?')) return;
      await api(`/demo/${id}`, { method: 'DELETE' });
      await loadDemos();
      render();
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ── Init ──
    async function init() {
      S.config = await api('/config');
      S.preflight = await api('/preflight');
      await loadDemos();
      connectWS();
      if (!S.preflight.apiKeySet) S.view = 'settings';
      render();
    }
    init();
  </script>
</body>
</html>
